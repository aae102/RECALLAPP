<body>
  <div id="root"></div>

  <script>
    /******************************************************************
     * STORAGE
     ******************************************************************/
    const STORAGE_KEY = "recall_full_v2";
    const INIT = { decks:{}, stats:{} };

    let DATA = loadData();
    let SCREEN = "dashboard"; // dashboard | study | manage | add

    function loadData(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : structuredClone(INIT);
      }catch{
        return structuredClone(INIT);
      }
    }
    function saveData(d){
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }catch{}
    }
    function updateData(mutator){
      const next = structuredClone(DATA);
      mutator(next);
      DATA = next;
      saveData(DATA);
      render();
    }
    function setScreen(s){
      SCREEN = s;
      render();
    }

    /******************************************************************
     * DATE + DUE
     ******************************************************************/
    function todayStr(){ return new Date().toISOString().slice(0,10); }
    function nowMs(){ return Date.now(); }
    function isDue(card){
      return !card.mastered && (!card.nextReview || card.nextReview.slice(0,10) <= todayStr());
    }

    /******************************************************************
     * SM-2
     ******************************************************************/
    function sm2(card, quality){
      let {interval=1, easeFactor=2.5, repetitions=0} = card;
      if (quality < 3){ repetitions = 0; interval = 1; }
      else{
        if (repetitions === 0) interval = 1;
        else if (repetitions === 1) interval = 6;
        else interval = Math.round(interval * easeFactor);
        repetitions++;
      }
      easeFactor = Math.max(1.3, easeFactor + 0.1 - (5-quality) * (0.08 + (5-quality)*0.02));
      const nr = new Date();
      nr.setDate(nr.getDate() + interval);
      return {...card, interval, easeFactor, repetitions, nextReview: nr.toISOString(), mastered: quality===5};
    }

    /******************************************************************
     * ANSWER MATCHING
     ******************************************************************/
    function normalizeStr(s){
      return (s||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
    }
    function levenshtein(a,b){
      const dp = Array.from({length:a.length+1}, (_,i)=>Array.from({length:b.length+1},(_,j)=> i===0?j : j===0?i : 0));
      for(let i=1;i<=a.length;i++){
        for(let j=1;j<=b.length;j++){
          dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
        }
      }
      return dp[a.length][b.length];
    }
    function checkAnswer(input, answer){
      const inp = normalizeStr(input), ans = normalizeStr(answer);
      if (!inp) return "wrong";
      if (inp === ans) return "correct";
      if (inp.includes(ans)) return "correct";
      if (ans.includes(inp) && inp.length >= Math.floor(ans.length * 0.55)) return "correct";

      const ansWords = ans.split(" ");
      if (ansWords.length === 1){
        const d = levenshtein(inp, ans);
        if (d === 0) return "correct";
        if (d <= 1) return "close";
        if (d <= 2 && ans.length > 6) return "close";
        return "wrong";
      }
      const keywords = ansWords.filter(w=>w.length>=4);
      if (!keywords.length) return levenshtein(inp, ans) <= Math.floor(ans.length*.2) ? "close" : "wrong";
      const inpWords = inp.split(" ");
      let hits = 0;
      for (const kw of keywords){
        if (inpWords.some(w => w===kw || w.includes(kw) || kw.includes(w) || levenshtein(w,kw)<=1)) hits++;
      }
      const cov = hits / keywords.length;
      if (cov >= 0.8) return "correct";
      if (cov >= 0.5) return "close";
      return "wrong";
    }

    /******************************************************************
     * CLOZE + MC MODE
     ******************************************************************/
    function makeCloze(text){
      const words = (text||"").split(" ");
      if (words.length < 3) return {clozeText:"___", answer:text||""};
      let idx=1, max=0;
      words.forEach((w,i)=>{
        const l = w.replace(/[^a-z]/gi,"").length;
        if (l>max && i>0){ max=l; idx=i; }
      });
      return {clozeText: words.map((w,i)=> i===idx ? "___" : w).join(" "), answer: words[idx]};
    }
    function decideAdaptiveMode(card){
      return card.adaptivePref || "cloze"; // "cloze" or "mc"
    }
    function buildMCOptions(currentCard, deckCards, n=4){
      const correct = (currentCard.back||"").trim();
      const pool = deckCards
        .map(c => (c.back||"").trim())
        .filter(b => b && b !== correct && b.length >= 2 && b.length <= 120);

      const picks = [];
      const used = new Set([correct]);
      let guard = 0;
      while (picks.length < (n-1) && pool.length && guard < 500){
        guard++;
        const cand = pool[Math.floor(Math.random()*pool.length)];
        if (!used.has(cand)){
          used.add(cand);
          picks.push(cand);
        }
      }
      const opts = [correct, ...picks].slice(0,n);
      for (let i=opts.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [opts[i], opts[j]] = [opts[j], opts[i]];
      }
      return { options: opts, correct };
    }

    /******************************************************************
     * SHORT-TERM LEARNING REPEATS
     ******************************************************************/
    function computeLearningDelayMs(label){
      if (label === "again") return 60_000;   // 1 min
      if (label === "hard")  return 150_000;  // 2.5 min
      return 0;
    }

    /******************************************************************
     * INTERLEAVED QUEUE
     ******************************************************************/
    function buildInterleavedQueue(decks, limit=150, alreadyReviewed=0){
      const rem = Math.max(0, limit - alreadyReviewed);
      if (!rem) return [];
      const deckDue = {};
      let total = 0;
      for (const [id, deck] of Object.entries(decks)){
        const due = (deck.cards||[]).filter(isDue);
        if (due.length){ deckDue[id]=due; total += due.length; }
      }
      if (!total) return [];
      const slots = {};
      let assigned=0;
      for (const [id, due] of Object.entries(deckDue)){
        const s = Math.max(1, Math.floor(rem * (due.length/total)));
        slots[id] = Math.min(s, due.length);
        assigned += slots[id];
      }
      let extra = rem - assigned;
      for (const id of Object.keys(slots)){
        if (extra<=0) break;
        const add = Math.min(extra, deckDue[id].length - slots[id]);
        slots[id] += add; extra -= add;
      }
      const queues = Object.entries(slots).map(([id,count]) => ({
        deckId:id,
        cards: deckDue[id].slice(0,count).map(c=>({...c, deckId:id}))
      }));
      const result=[];
      const maxLen = Math.max(...queues.map(q=>q.cards.length));
      for(let i=0;i<maxLen;i++){
        for (const q of queues){
          if (i < q.cards.length) result.push(q.cards[i]);
        }
      }
      return result;
    }

    /******************************************************************
     * IMAGE HELPERS
     ******************************************************************/
    function fileToBase64(file){
      return new Promise((resolve)=>{
        const r = new FileReader();
        r.onload = ()=> resolve(r.result);
        r.readAsDataURL(file);
      });
    }
    async function clipboardImageToBase64(e){
      const items = e.clipboardData?.items || [];
      for (const it of items){
        if (it.type && it.type.startsWith("image/")){
          const file = it.getAsFile();
          if (!file) continue;
          return await fileToBase64(file);
        }
      }
      return null;
    }

    /******************************************************************
     * SMART IMPORTS
     ******************************************************************/
    async function extractLinesFromPDF(file){
      const buf = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({data: buf}).promise;
      const linesOut = [];

      for (let p=1; p<=pdf.numPages; p++){
        const page = await pdf.getPage(p);
        const tc = await page.getTextContent({ normalizeWhitespace: true, disableCombineTextItems: false });
        const items = tc.items.map(it=>{
          const [a,b,c,d,e,f] = it.transform;
          return { str:(it.str||"").trim(), x:e, y:f };
        }).filter(it=>it.str);

        items.sort((u,v)=> v.y - u.y || u.x - v.x);
        const groups = [];
        const tol = 2.2;
        for (const it of items){
          const last = groups[groups.length-1];
          if (!last || Math.abs(last.y - it.y) > tol){
            groups.push({ y: it.y, cols:[it] });
          }else{
            last.cols.push(it);
          }
        }

        for (const g of groups){
          g.cols.sort((u,v)=> u.x - v.x);
          const parts=[];
          for (let i=0;i<g.cols.length;i++){
            const cur=g.cols[i], prev=g.cols[i-1];
            if (prev){
              const gap = cur.x - prev.x;
              if (gap > 80) parts.push(" | ");
              else if (gap > 12) parts.push(" ");
            }
            parts.push(cur.str);
          }
          const text = parts.join("").replace(/\s+/g," ").trim();
          if (text) linesOut.push({page:p, text});
        }
      }

      const freq = new Map();
      for (const L of linesOut){
        const k = L.text.toLowerCase();
        freq.set(k, (freq.get(k)||0)+1);
      }
      const pages = new Set(linesOut.map(l=>l.page)).size || 1;
      const threshold = Math.max(3, Math.floor(pages * 0.55));
      const filtered = linesOut.filter(L => (freq.get(L.text.toLowerCase())||0) < threshold);

      return filtered.map(l=>l.text);
    }

    async function extractCardsFromSpreadsheet(file){
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:"array"});
      const sheetName = wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:""});
      if (!rows || !rows.length) return [];

      let headerRowIdx = 0;
      let bestScore = -1;
      for (let i=0; i<Math.min(10, rows.length); i++){
        const r = rows[i].map(x=>String(x||"").trim().toLowerCase());
        const score =
          (r.some(c=>["front","question","q"].includes(c))?1:0)+
          (r.some(c=>["back","answer","a"].includes(c))?1:0);
        if (score>bestScore){ bestScore=score; headerRowIdx=i; }
      }

      const header = rows[headerRowIdx].map(x=>String(x||"").trim().toLowerCase());
      const fi = header.findIndex(h=>h==="front"||h==="question"||h==="q");
      const bi = header.findIndex(h=>h==="back"||h==="answer"||h==="a");
      const frontIdx = fi>=0 ? fi : 0;
      const backIdx  = bi>=0 ? bi : 1;

      const cards=[];
      for (let i=headerRowIdx+1; i<rows.length; i++){
        const r = rows[i].map(x=>String(x||"").trim());
        if (r.every(c=>!c)) continue;

        let front = (r[frontIdx]||"").trim();
        let back  = (r[backIdx]||"").trim();

        if ((!front || !back) && r.length===1){
          const split = smartSplitOneLine(r[0]);
          if (split){ front = split.front; back = split.back; }
        }
        if (front && back) cards.push({front: front.slice(0,500), back: back.slice(0,500)});
      }
      return cards;
    }

    function smartSplitOneLine(line){
      const s = String(line||"").trim();
      if (!s) return null;
      const seps = ["\t"," | "," → ","->","—"," – "," - "," : "];
      for (const sep of seps){
        const idx = s.indexOf(sep);
        if (idx>0 && idx<s.length-1){
          const left = s.slice(0,idx).trim();
          const right = s.slice(idx+sep.length).trim();
          if (left.length>=2 && right.length>=2) return {front:left, back:right};
        }
      }
      const m = s.match(/Q:\s*(.+?)\s*A:\s*(.+)$/i);
      if (m) return {front:m[1].trim(), back:m[2].trim()};
      return null;
    }

    function normalizeFront(left){
      const s = String(left||"").trim();
      if (!s) return "";
      if (/\?$/.test(s)) return s;
      if (/^(define|what is|why|how|when|where|which|who)\b/i.test(s)) return s.endsWith("?")?s:(s+"?");
      return `What is ${s}?`;
    }

    function parseCardsFromTextSmart(text){
      const raw = String(text||"");
      const lines = raw.split(/\n/).map(l=>l.trim()).filter(Boolean);

      // 0) two-column separator from PDF extractor
      {
        const tmp=[];
        for (const line of lines){
          if (line.includes(" | ")){
            const [l,r] = line.split(" | ").map(s=>s.trim());
            if (l && r && l.length>=2 && r.length>=2) tmp.push({front:normalizeFront(l), back:r});
          }
        }
        if (tmp.length>=10) return tmp;
      }

      // 1) Q/A blocks
      {
        const joined = raw.replace(/\n/g," ");
        const matches = [...joined.matchAll(/Q:\s*(.+?)\s*A:\s*(.+?)(?=Q:|$)/gi)];
        if (matches.length>=3){
          return matches
            .map(m=>({front:m[1].trim(), back:m[2].trim()}))
            .filter(c=>c.front.length>4 && c.back.length>1);
        }
      }

      // 2) Question/Answer
      {
        const joined = raw.replace(/\n/g," ");
        const matches = [...joined.matchAll(/Question:\s*(.+?)\s*Answer:\s*(.+?)(?=Question:|$)/gi)];
        if (matches.length>=3){
          return matches
            .map(m=>({front:m[1].trim(), back:m[2].trim()}))
            .filter(c=>c.front.length>4 && c.back.length>1);
        }
      }

      // 3) numbered Qs
      {
        const tmp=[];
        for (let i=0;i<lines.length;i++){
          if (/^\d+[\.\)]\s+.+\?$/.test(lines[i])){
            const front = lines[i].replace(/^\d+[\.\)]\s+/,"").trim();
            const ans=[];
            let j=i+1;
            while (j<lines.length && !/^\d+[\.\)]\s/.test(lines[j]) && ans.length<6){
              if (lines[j].length>2) ans.push(lines[j]);
              j++;
            }
            if (ans.length){ tmp.push({front, back: ans.join(" ").slice(0,500)}); i=j-1; }
          }
        }
        if (tmp.length>=3) return tmp;
      }

      // 4) term-definition
      {
        const tmp=[];
        for (const line of lines){
          const m = line.match(/^(.{2,80}?)(?:\s*[:\-–—]\s+)(.{6,}.*)$/);
          if (!m) continue;
          const left = m[1].trim();
          const right = m[2].trim();
          if (/^(https?|fig|table|note|section|chapter|page)\b/i.test(left)) continue;
          if (left.split(" ").length>10) continue;
          tmp.push({front: normalizeFront(left), back: right.slice(0,500)});
        }
        if (tmp.length>=10) return tmp;
      }

      // 5) one-line split
      {
        const tmp=[];
        for (const line of lines){
          const split = smartSplitOneLine(line);
          if (split) tmp.push({front: split.front, back: split.back});
        }
        if (tmp.length>=10) return tmp;
      }

      // 6) fallback lines
      return lines
        .filter(l=>l.length>20 && l.length<400)
        .map(l=>({front:l, back:"Review: "+l}));
    }

    function cardsFromLinesLineByLine(lines){
      const clean = lines
        .map(x=>String(x||"").replace(/\s+/g," ").trim())
        .filter(x=>x.length>=6 && x.length<=400);
      const cards=[];
      for (let i=0;i<clean.length-1;i+=2){
        cards.push({front: normalizeFront(clean[i]), back: clean[i+1]});
      }
      return cards;
    }

    function bindAdd(){
      document.getElementById("backDash").onclick = ()=> setScreen("dashboard");

      let mode = "pdf";
      let files = [];
      let textContent = "";
      let busy = false;
      let pdfLineByLine = false;

      const modeButtons = [...document.querySelectorAll("[data-mode]")];
      const modeArea = document.getElementById("modeArea");
      const msgArea = document.getElementById("msgArea");
      const buildBtn = document.getElementById("buildBtn");

      function setMode(m){
        mode = m;
        modeButtons.forEach(b=>b.classList.toggle("active", b.dataset.mode===m));
        files = [];
        textContent = "";
        pdfLineByLine = false;
        msgArea.innerHTML = "";
        renderModeArea();
        buildBtn.textContent = (mode==="manual") ? "Create Empty Deck" : "Extract & Create Deck";
      }

      function pushMsg(kind, text){
        const cls = kind==="err" ? "box err" : kind==="ok" ? "box ok" : "box";
        msgArea.innerHTML = `<div class="${cls}">${escapeHTML(text)}</div>` + msgArea.innerHTML;
      }

      function renderModeArea(){
        if (mode==="pdf"){
          modeArea.innerHTML = `
            <div style="margin-bottom:16px">
              <div class="tiny" style="font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;color:var(--muted)">PDF Files</div>
              <div class="upload" id="uploadZone">
                <div style="font-size:30px;margin-bottom:8px">◉</div>
                <div style="color:var(--muted);font-weight:800">Click to upload PDF(s)</div>
                <div style="color:var(--muted2);font-size:12px;margin-top:4px">Layout-aware extraction (2-column friendly)</div>
              </div>
              <input type="file" id="fileInput" accept=".pdf" multiple style="display:none" />
              <label style="display:flex;gap:10px;align-items:center;margin-top:10px;color:var(--muted);font-size:12px;font-weight:800">
                <input type="checkbox" id="lineByLine" />
                Line-by-line mode (pairs adjacent lines into cards)
              </label>
              <div class="note">If your PDF is basically a list, line-by-line can work better than parsing.</div>
            </div>
          `;
          const input = document.getElementById("fileInput");
          document.getElementById("uploadZone").onclick = ()=> input.click();
          input.onchange = (e)=>{
            files = [...e.target.files];
            pushMsg("ok", `Loaded ${files.length} PDF(s): ${files.map(f=>f.name).join(", ")}`);
          };
          document.getElementById("lineByLine").onchange = (e)=>{ pdfLineByLine = !!e.target.checked; };
        }

        if (mode==="excel"){
          modeArea.innerHTML = `
            <div style="margin-bottom:16px">
              <div class="tiny" style="font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;color:var(--muted)">Excel / CSV</div>
              <div class="upload" id="uploadZone">
                <div style="font-size:30px;margin-bottom:8px">▦</div>
                <div style="color:var(--muted);font-weight:800">Click to upload .xlsx / .csv</div>
                <div style="color:var(--muted2);font-size:12px;margin-top:4px">Detects Front/Back or Question/Answer headers</div>
              </div>
              <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" />
              <div class="note">Best: two columns named Front and Back.</div>
            </div>
          `;
          const input = document.getElementById("fileInput");
          document.getElementById("uploadZone").onclick = ()=> input.click();
          input.onchange = (e)=>{
            files = [...e.target.files];
            pushMsg("ok", `Loaded spreadsheet: ${files[0]?.name || "(none)"}`);
          };
        }

        if (mode==="text"){
          modeArea.innerHTML = `
            <div style="margin-bottom:16px">
              <div class="tiny" style="font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;color:var(--muted)">Paste Content</div>
              <textarea class="textarea" id="textArea" rows="10" placeholder="Paste anything:
Q: ... A: ...
Term - Definition
or paragraphs — auto-detects format."></textarea>
            </div>
          `;
          document.getElementById("textArea").oninput = (e)=>{ textContent = e.target.value; };
        }

        if (mode==="manual"){
          modeArea.innerHTML = `<div class="box">Deck created empty — add cards in Manage.</div>`;
        }
      }

      async function buildDeck(){
        if (busy) return;
        const name = document.getElementById("deckName").value.trim();
        if (!name){ pushMsg("err","Enter a deck name"); return; }

        busy = true;
        buildBtn.disabled = true;
        buildBtn.textContent = "Processing…";

        try{
          let rawCards = [];

          if (mode==="pdf"){
            if (!files.length) throw new Error("Upload at least one PDF");
            for (const f of files){
              pushMsg("ok", `Extracting: ${f.name}`);
              const lines = await extractLinesFromPDF(f);
              if (pdfLineByLine){
                rawCards = rawCards.concat(cardsFromLinesLineByLine(lines));
              }else{
                rawCards = rawCards.concat(parseCardsFromTextSmart(lines.join("\n")));
              }
            }
          }

          if (mode==="excel"){
            if (!files.length) throw new Error("Upload an Excel/CSV file");
            rawCards = await extractCardsFromSpreadsheet(files[0]);
          }

          if (mode==="text"){
            if (!textContent.trim()) throw new Error("Paste some text");
            rawCards = parseCardsFromTextSmart(textContent);
          }

          if (mode==="manual"){
            rawCards = [];
          }

          const seen = new Set();
          const clean = [];
          for (const c of rawCards){
            const front = (c.front||"").trim();
            const back  = (c.back||"").trim();
            if (!front || !back) continue;
            const k = front+"||"+back;
            if (seen.has(k)) continue;
            seen.add(k);
            clean.push({front: front.slice(0,500), back: back.slice(0,500)});
          }

          const cards = clean.map((c,i)=>makeCard({
            id: `${Date.now()}_${i}`,
            front: c.front,
            back: c.back
          }));

          const deckId = `deck_${Date.now()}`;
          updateData(d=>{
            d.decks[deckId] = { name, cards, createdAt: new Date().toISOString() };
          });

        }catch(e){
          pushMsg("err", e.message || "Error");
        }finally{
          busy = false;
          buildBtn.disabled = false;
          buildBtn.textContent = (mode==="manual") ? "Create Empty Deck" : "Extract & Create Deck";
        }
      }

      modeButtons.forEach(b=> b.onclick = ()=> setMode(b.dataset.mode));
      buildBtn.onclick = buildDeck;

      renderModeArea();
    }

        id: id || String(Date.now()),
        front: front || "",
        back: back || "",
        frontImage,
        backImage,

        wrongCount: 0,
        interval: 1,
        easeFactor: 2.5,
        repetitions: 0,
        nextReview: null,
        mastered: false,

        adaptiveThreshold: 3,
        adaptiveMode: "typed",
        adaptivePref: "cloze",
      };
    }

                  <div class="ellipsis" style="font-size:13px;font-weight:900">${escapeHTML(c.front)}</div>
                  <div class="ellipsis" style="font-size:12px;color:var(--muted);margin-top:3px">${escapeHTML(c.back)}</div>
                  <div class="tiny" style="margin-top:6px;display:flex;gap:10px;flex-wrap:wrap">
                    ${(c.frontImage)?`<span>🖼 front</span>`:""}
                    ${(c.backImage)?`<span>🖼 back</span>`:""}
                    <span>mode: <span style="color:var(--purple)">${escapeHTML(c.adaptiveMode||"typed")}</span></span>
                    <span>wrong: ${c.wrongCount||0}</span>
                  </div>
                </div>

                <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;align-items:flex-end">
                  <button class="btnSmall" data-edit="${c.id}">Edit</button>
                  ${c.mastered ? `<button class="btnSmall" data-reset="${c.id}" style="color:var(--orange);border-color:rgba(251,146,60,.25)">Reset</button>` : ``}
                  <button class="btnSmall btnDanger" data-del="${c.id}">Delete</button>
                </div>
              </div>
            `).join("")}
          </div>
        `;

        function pill(k){
          return `<button class="pill ${filter===k?'active':''}" data-filter="${k}">${k}</button>`;
        }

        deckPanel.querySelectorAll("[data-filter]").forEach(b=>{
          b.onclick = ()=>{ filter = b.dataset.filter; renderPanel(); };
        });

        deckPanel.querySelector("#deleteDeckBtn").onclick = ()=>{
          updateData(d=>{ delete d.decks[selected]; });
          selected = null;
          editingCardId = null;
        };

        deckPanel.querySelector("#newCardBtn").onclick = ()=>{
          editingCardId = "__new__";
          renderPanel();
        };

        deckPanel.querySelectorAll("[data-edit]").forEach(btn=>{
          btn.onclick = ()=>{ editingCardId = btn.dataset.edit; renderPanel(); };
        });

        deckPanel.querySelectorAll("[data-del]").forEach(btn=>{
          btn.onclick = ()=>{
            const cid = btn.dataset.del;
            updateData(d=>{
              d.decks[selected].cards = d.decks[selected].cards.filter(x=>x.id!==cid);
            });
          };
        });

        deckPanel.querySelectorAll("[data-reset]").forEach(btn=>{
          btn.onclick = ()=>{
            const cid = btn.dataset.reset;
            updateData(d=>{
              const idx = d.decks[selected].cards.findIndex(x=>x.id===cid);
              if (idx>=0){
                const c = d.decks[selected].cards[idx];
                d.decks[selected].cards[idx] = {
                  ...c,
                  mastered:false, wrongCount:0, nextReview:null,
                  interval:1, repetitions:0,
                  adaptiveMode:"typed",
                };
              }
            });
          };
        });

        const editBox = deckPanel.querySelector("#editBox");
        if (editingCardId){
          const isNew = editingCardId === "__new__";
          const c = isNew ? makeCard({id:String(Date.now()), front:"", back:""}) : editCard;

          if (!c){
            editBox.innerHTML = `<div class="box err">Could not load card.</div>`;
            return;
          }

          editBox.innerHTML = `
            <div class="box" style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
                <div style="font-weight:900">${isNew ? "Add Card" : "Edit Card"}</div>
                <button class="btnSmall" id="closeEdit">Close</button>
              </div>

              <div style="display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px">
                <textarea class="textarea" id="efront" rows="2" placeholder="Front text">${escapeHTML(c.front)}</textarea>

                <div class="box" style="background:var(--panel2)">
                  <div style="font-weight:900;margin-bottom:6px">Front image</div>
                  <div class="tiny" style="color:var(--muted);margin-bottom:8px">Click area then paste (Ctrl+V) an image, or upload.</div>
                  <div id="frontPaste" class="upload" style="padding:14px">Paste image here</div>
                  <input type="file" id="frontFile" accept="image/*" style="margin-top:10px" />
                  <div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                    ${c.frontImage ? `<img class="imgThumb" src="${c.frontImage}" />` : `<span class="tiny" style="color:var(--muted)">No image</span>`}
                    <button class="btnSmall btnDanger" id="clearFrontImg">Clear</button>
                  </div>
                </div>

                <textarea class="textarea" id="eback" rows="2" placeholder="Back text">${escapeHTML(c.back)}</textarea>

                <div class="box" style="background:var(--panel2)">
                  <div style="font-weight:900;margin-bottom:6px">Back image</div>
                  <div class="tiny" style="color:var(--muted);margin-bottom:8px">Click area then paste (Ctrl+V) an image, or upload.</div>
                  <div id="backPaste" class="upload" style="padding:14px">Paste image here</div>
                  <input type="file" id="backFile" accept="image/*" style="margin-top:10px" />
                  <div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                    ${c.backImage ? `<img class="imgThumb" src="${c.backImage}" />` : `<span class="tiny" style="color:var(--muted)">No image</span>`}
                    <button class="btnSmall btnDanger" id="clearBackImg">Clear</button>
                  </div>
                </div>

                <div style="display:flex;gap:10px;flex-wrap:wrap">
                  <label class="tiny" style="color:var(--muted);font-weight:900">
                    After 3 wrongs, switch to:
                    <select id="prefMode" style="margin-left:8px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 8px">
                      <option value="cloze" ${c.adaptivePref==="cloze"?"selected":""}>Cloze</option>
                      <option value="mc" ${c.adaptivePref==="mc"?"selected":""}>Multiple choice</option>
                    </select>
                  </label>
                </div>

                <button class="btnPrimary" id="saveCard">${isNew ? "Add Card" : "Save Changes"}</button>
              </div>
            </div>
          `;

          const close = deckPanel.querySelector("#closeEdit");
          close.onclick = ()=>{ editingCardId = null; renderPanel(); };

          const frontPaste = deckPanel.querySelector("#frontPaste");
          const backPaste = deckPanel.querySelector("#backPaste");

          let frontImg = c.frontImage || null;
          let backImg = c.backImage || null;

          frontPaste.tabIndex = 0;
          backPaste.tabIndex = 0;

          frontPaste.onpaste = async (e)=>{
            const b64 = await clipboardImageToBase64(e);
            if (b64){ frontImg = b64; renderPanel(); }
          };
          backPaste.onpaste = async (e)=>{
            const b64 = await clipboardImageToBase64(e);
            if (b64){ backImg = b64; renderPanel(); }
          };

          deckPanel.querySelector("#frontFile").onchange = async (e)=>{
            const file = e.target.files?.[0];
            if (file){ frontImg = await fileToBase64(file); renderPanel(); }
          };
          deckPanel.querySelector("#backFile").onchange = async (e)=>{
            const file = e.target.files?.[0];
            if (file){ backImg = await fileToBase64(file); renderPanel(); }
          };

          deckPanel.querySelector("#clearFrontImg").onclick = ()=>{ frontImg=null; renderPanel(); };
          deckPanel.querySelector("#clearBackImg").onclick = ()=>{ backImg=null; renderPanel(); };

          deckPanel.querySelector("#saveCard").onclick = ()=>{
            const nf = deckPanel.querySelector("#efront").value.trim();
            const nb = deckPanel.querySelector("#eback").value.trim();
            const pref = deckPanel.querySelector("#prefMode").value;

            if (!nf && !frontImg) { alert("Add front text or image."); return; }
            if (!nb && !backImg) { alert("Add back text or image."); return; }

            updateData(d=>{
              const deckRef = d.decks[selected];
              if (isNew){
                const newC = makeCard({
                  id: String(Date.now()),
                  front: nf, back: nb,
                  frontImage: frontImg, backImage: backImg
                });
                newC.adaptivePref = pref;
                deckRef.cards.push(newC);
              }else{
                const idx = deckRef.cards.findIndex(x=>x.id===c.id);
                if (idx>=0){
                  const old = deckRef.cards[idx];
                  deckRef.cards[idx] = {
                    ...old,
                    front: nf,
                    back: nb,
                    frontImage: frontImg,
                    backImage: backImg,
                    adaptivePref: pref
                  };
                }
              }
            });

            editingCardId = null;
          };
        }
      }

      renderDeckList();
    }

    /******************************************************************

     ******************************************************************/
    function bindNav(){

        btn.onclick = ()=> setScreen(btn.dataset.nav);

    /******************************************************************
     * STUDY SCREEN (FIXED: no input wiping + study timer)
     ******************************************************************/
    function studyHTML(){
      const today = todayStr();
      const st = DATA.stats[today] || {reviewed:0,correct:0,wrong:0};
      const primaryQueue = buildInterleavedQueue(DATA.decks, 150, st.reviewed);

      if (!primaryQueue.length){
        return `
          <div class="studyWrap">
            <div class="done">
              <div class="ic">◈</div>
              <div class="t">Nothing due!</div>

        phase: "question",
        inputLive: "",      // ✅ preserve what user is typing

              <span class="mono" id="ptext" style="font-size:12px;color:var(--muted);white-space:nowrap"></span>

            <div style="font-size:12px;color:var(--muted);font-weight:900;white-space:nowrap" id="deckName"></div>
          </div>

          <div class="cardZone">
            <div id="modeTagWrap" style="display:flex;gap:8px;flex-wrap:wrap"></div>

            <div class="flash">
              <img id="frontImg" class="imgLarge" style="display:none" />
              <div class="q" id="qtext"></div>
              <div id="mcOptions" class="mcOptions" style="display:none"></div>
            </div>

            <div id="typedPane">
              <input class="ansInput" id="ansInput" placeholder="Type your answer…" autocomplete="off" spellcheck="false" />
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:10px;flex-wrap:wrap">
                <span class="hint">Enter to check · partial / keyword answers counted</span>
                <button class="btnPrimary" id="checkBtn">Check →</button>
              </div>
            </div>

            <div id="revealPane" class="reveal" style="display:none">
              <div class="banner" id="banner"></div>

              <div class="compare">
                <div class="ansRow"><span class="ansLabel">You:</span><span id="youAns"></span></div>
                <div class="ansRow"><span class="ansLabel">Answer:</span><span style="color:var(--green)" id="trueAns"></span></div>
              </div>

              <img id="backImg" class="imgLarge" style="display:none" />

              <div class="rating">
                ${rateBtn("Again","~1m","var(--red)","again",false)}
                ${rateBtn("Hard","~2–3m","var(--orange)","hard",false)}
                ${rateBtn("Good","few d","var(--blue)","good",false)}
                ${rateBtn("Easy","week+","var(--green)","easy",false)}
                ${rateBtn("Mastered","retire","var(--purple)","mastered",true)}
              </div>

              <div class="hint" style="text-align:center">Again/Hard repeat soon + Again can also requeue end-of-session</div>

          <div class="studyFoot">

              <span style="color:var(--green);font-weight:900">✓ <span id="sc"></span></span>

              <span style="color:var(--orange);font-weight:900">🔁 <span id="srq"></span> queued</span>
              <span style="color:var(--muted);font-weight:900"><span id="sleft"></span> left today</span>
            </div>
            <div class="footTimer">
              <span class="mono" style="color:var(--muted);font-weight:900">⏱ <span id="timer">00:00</span></span>

    function rateBtn(label, sub, col, id, wide){
      return `
        <button class="rBtn" data-rate="${id}" style="flex:${wide?1.5:1}; border-color:${col}44; color:${col}; background:${col}22">
          <span>${label}</span><span>${sub}</span>
        </button>
      `;
    }

    function bindStudy(){
      const exit = document.getElementById("exitStudy");
      if (exit) exit.onclick = ()=> setScreen("dashboard");

      const st = window.__study;
      if (!st) return;

      const qtext = document.getElementById("qtext");
      const ansInput = document.getElementById("ansInput");
      const checkBtn = document.getElementById("checkBtn");
      const typedPane = document.getElementById("typedPane");
      const revealPane = document.getElementById("revealPane");
      const banner = document.getElementById("banner");
      const youAns = document.getElementById("youAns");
      const trueAns = document.getElementById("trueAns");
      const reqBadge = document.getElementById("reqBadge");
      const pfill = document.getElementById("pfill");
      const ptext = document.getElementById("ptext");
      const deckName = document.getElementById("deckName");
      const modeTagWrap = document.getElementById("modeTagWrap");
      const mcOptions = document.getElementById("mcOptions");

      const frontImg = document.getElementById("frontImg");
      const backImg = document.getElementById("backImg");

      const sc = document.getElementById("sc");
      const sw = document.getElementById("sw");
      const srq = document.getElementById("srq");
      const sleft = document.getElementById("sleft");

      const timerEl = document.getElementById("timer");
      const pauseBtn = document.getElementById("pauseBtn");
      const resetTimerBtn = document.getElementById("resetTimerBtn");

      function currentCard(){
        const li = st.learning.findIndex(x => x.dueTimeMs <= nowMs());
        if (li >= 0){
          st.__learningPick = li;
          return st.learning[li].card;
        }
        st.__learningPick = -1;
        return st.isRequeue ? st.requeue[st.reqIdx] : st.primaryQueue[st.idx];
      }

      function getDeckCards(deckId){
        return DATA.decks[deckId]?.cards || [];
      }

      function fmtMs(ms){
        const s = Math.max(0, Math.floor(ms/1000));
        const mm = String(Math.floor(s/60)).padStart(2,"0");
        const ss = String(s%60).padStart(2,"0");
        return `${mm}:${ss}`;
      }

      function updateTimer(){
        if (!timerEl) return;
        if (st.timerPaused){
          const pausedMs = st.timerPauseAccumMs + (st.timerPauseStartMs ? (Date.now()-st.timerPauseStartMs) : 0);
          timerEl.textContent = fmtMs(pausedMs);
          return;
        }
        const elapsed = Date.now() - st.timerStartMs + st.timerPauseAccumMs;
        timerEl.textContent = fmtMs(elapsed);
      }

      pauseBtn.onclick = ()=>{
        if (!st.timerPaused){
          st.timerPaused = true;
          st.timerPauseStartMs = Date.now();
          pauseBtn.textContent = "Resume";
        }else{
          st.timerPaused = false;
          st.timerPauseAccumMs += (Date.now() - st.timerPauseStartMs);
          st.timerPauseStartMs = null;
          pauseBtn.textContent = "Pause";
        }
        updateTimer();
      };

      resetTimerBtn.onclick = ()=>{
        st.timerStartMs = Date.now();
        st.timerPauseAccumMs = 0;
        if (st.timerPaused){
          st.timerPauseStartMs = Date.now();
        }
        updateTimer();
      };

      // ✅ preserve typing (no wipe)
      ansInput.oninput = (e)=>{
        st.inputLive = e.target.value;
      };

      function computeMode(card){
        let mode = card.adaptiveMode || "typed";
        const threshold = card.adaptiveThreshold ?? 3;
        const wrongs = card.wrongCount || 0;
        if (mode === "typed" && wrongs >= threshold){
          mode = decideAdaptiveMode(card); // cloze or mc
        }
        return mode;
      }

      function refreshUI(){
        const card = currentCard();
        if (!card){
          const acc = st.sess.total ? Math.round((st.sess.correct/st.sess.total)*100) : 0;
          document.getElementById("root").innerHTML = `
            <div class="studyWrap">
              <div class="done">
                <div class="ic">✦</div>
                <div class="t">Session Complete!</div>
                <div class="s">${acc}% accuracy · ${st.sess.requeues} requeue(s)</div>
                <button class="btnOutline" id="exitStudy">← Back to Dashboard</button>
              </div>
            </div>
          `;
          document.getElementById("exitStudy").onclick = ()=> setScreen("dashboard");
          return;
        }

        const mode = computeMode(card);
        const wrongs = card.wrongCount || 0;

        modeTagWrap.innerHTML = "";
        if (mode === "cloze") modeTagWrap.innerHTML += `<div class="clozeTag">CLOZE MODE</div>`;
        if (mode === "mc") modeTagWrap.innerHTML += `<div class="mcTag">MULTIPLE CHOICE</div>`;
        if (wrongs > 0) modeTagWrap.innerHTML += `<div class="warnTag">Wrong: ${wrongs}</div>`;

        const completed = st.isRequeue ? (st.primaryQueue.length + st.reqIdx) : st.idx;
        const total = st.primaryQueue.length + (st.requeue.length || 0);
        const pct = total ? (completed/total) : 0;
        pfill.style.width = (pct*100).toFixed(1)+"%";
        ptext.textContent = `${completed}/${st.primaryQueue.length}`;

        reqBadge.style.display = st.isRequeue ? "inline-flex" : "none";
        if (st.isRequeue) reqBadge.textContent = `🔁 Requeue — ${st.requeue.length - st.reqIdx} left`;

        deckName.textContent = DATA.decks[card.deckId]?.name || "";

        if (card.frontImage){
          frontImg.src = card.frontImage;
          frontImg.style.display = "block";
        }else{
          frontImg.style.display = "none";
        }

        if (mode === "cloze"){
          const cl = makeCloze(card.back);
          qtext.textContent = cl.clozeText;
        } else {
          qtext.textContent = card.front;
        }

        // MC options (only build once per question)
        if (mode === "mc" && st.phase === "question"){
          typedPane.style.display = "none";
          mcOptions.style.display = "flex";

          if (!st.mc){ // ✅ don’t rebuild repeatedly
            const deckCards = getDeckCards(card.deckId);
            st.mc = buildMCOptions(card, deckCards, 4);
            st.mcPicked = null;
          }

          mcOptions.innerHTML = st.mc.options.map((opt, i)=>`
            <button class="mcBtn" data-mc="${i}">
              ${String.fromCharCode(65+i)}. ${escapeHTML(opt)}
            </button>
          `).join("");

          mcOptions.querySelectorAll("[data-mc]").forEach(btn=>{
            btn.onclick = ()=>{
              const pick = st.mc.options[Number(btn.dataset.mc)];
              st.mcPicked = pick;
              st.result = (normalizeStr(pick) === normalizeStr(st.mc.correct)) ? "correct" : "wrong";
              st.phase = "revealed";
              refreshUI();
            };
          });
        }else{
          mcOptions.style.display = "none";
          typedPane.style.display = (st.phase === "question") ? "block" : "none";
          if (st.phase === "question"){
            // ✅ only clear when we advanced to a new card
            if (st.justAdvanced){
              st.inputLive = "";
              st.justAdvanced = false;
            }
            // ✅ keep whatever user typed
            if (ansInput.value !== st.inputLive) ansInput.value = st.inputLive;
            ansInput.placeholder = (mode==="cloze") ? "Fill in the blank…" : "Type your answer…";
          }
        }

        revealPane.style.display = (st.phase === "revealed") ? "flex" : "none";

        if (st.phase === "revealed"){
          const res = st.result;
          banner.className = "banner " + res;
          banner.textContent =
            res==="correct" ? "✓ Correct!" :
            res==="close"   ? "≈ Close — review the full answer" :
                              "✗ Incorrect";

          const you = (mode === "mc") ? (st.mcPicked || "") : (st.inputLive || "");
          youAns.textContent = you;
          youAns.style.color = (res==="wrong") ? "var(--red)" : "var(--text)";
          trueAns.textContent = card.back;

          if (card.backImage){
            backImg.src = card.backImage;
            backImg.style.display = "block";
          }else{
            backImg.style.display = "none";
          }
        } else {
          backImg.style.display = "none";
        }

        sc.textContent = st.sess.correct;
        sw.textContent = st.sess.wrong;
        srq.textContent = st.requeue.length;
        const today = todayStr();
        const already = (DATA.stats[today]?.reviewed||0);
        sleft.textContent = Math.max(0, 150 - already);
      }

      function doCheckTyped(){
        const card = currentCard();
        if (!card) return;

        const mode = computeMode(card);
        if (mode === "mc") return;

        const input = (st.inputLive || "").trim();
        if (!input) return;

        const ans = (mode === "cloze") ? makeCloze(card.back).answer : card.back;
        st.result = checkAnswer(input, ans);
        st.phase = "revealed";
        refreshUI();
      }

      function advance(){
        st.result = null;
        st.mc = null;
        st.mcPicked = null;
        st.phase = "question";
        st.justAdvanced = true;

        if (st.isRequeue){
          if (st.reqIdx + 1 < st.requeue.length) st.reqIdx++;
          else {
            st.isRequeue = false;
            st.idx = st.primaryQueue.length;
          }
        }else{
          if (st.idx + 1 < st.primaryQueue.length) st.idx++;
          else if (st.requeue.length){
            st.isRequeue = true;
            st.reqIdx = 0;
          }else{
            st.idx = st.primaryQueue.length;
          }
        }
        refreshUI();
        // focus after rendering (typed mode)
        setTimeout(()=>{ if (document.activeElement !== ansInput) ansInput.focus(); }, 0);
      }

      function rateWithLabel(label, quality){
        const card = currentCard();
        if (!card) return;

        const ok = quality >= 3;
        const newCard = sm2(card, quality);

        const wasWrong = (st.result === "wrong");
        if (wasWrong || label==="again" || label==="hard"){
          newCard.wrongCount = (card.wrongCount||0) + 1;
        } else if (quality >= 4){
          newCard.wrongCount = 0;
        } else {
          newCard.wrongCount = card.wrongCount || 0;
        }

        const threshold = newCard.adaptiveThreshold ?? 3;
        if ((newCard.wrongCount||0) >= threshold){
          newCard.adaptiveMode = decideAdaptiveMode(newCard); // cloze or mc
        } else {
          newCard.adaptiveMode = "typed";
        }

        updateData(d=>{
          for (const did in d.decks){
            const ci = d.decks[did].cards.findIndex(c=>c.id===card.id);
            if (ci>=0){ d.decks[did].cards[ci] = newCard; break; }
          }
          const t = st.today;
          if (!d.stats[t]) d.stats[t] = {reviewed:0,correct:0,wrong:0};
          d.stats[t].reviewed += 1;
          if (ok) d.stats[t].correct += 1; else d.stats[t].wrong += 1;
        });

        const delay = computeLearningDelayMs(label);
        if (delay > 0){
          st.learning.push({ card: {...newCard, deckId: card.deckId}, dueTimeMs: nowMs() + delay });
        }

        st.sess.total += 1;
        st.sess.correct += ok ? 1 : 0;
        st.sess.wrong += ok ? 0 : 1;

        if (label === "again"){
          st.sess.requeues += 1;
          st.requeue.push({...newCard, deckId: card.deckId});
        }

        if (st.__learningPick >= 0){
          st.learning.splice(st.__learningPick, 1);
          st.__learningPick = -1;
        }

        advance();
      }

      checkBtn.onclick = doCheckTyped;
      ansInput.onkeydown = (e)=>{ if (e.key === "Enter") doCheckTyped(); };

      document.querySelectorAll("[data-rate]").forEach(btn=>{
        btn.onclick = ()=>{
          const id = btn.dataset.rate;
          if (id==="again") rateWithLabel("again", 0);
          if (id==="hard")  rateWithLabel("hard",  1);
          if (id==="good")  rateWithLabel("good",  3);
          if (id==="easy")  rateWithLabel("easy",  4);
          if (id==="mastered") rateWithLabel("mastered", 5);
        };
      });

      // ✅ Timer tick
      setInterval(updateTimer, 1000);

      // ✅ Lightweight “due learning” watcher (NO input wiping)
      // Only refresh when a learning card becomes due and we’re waiting on question screen.
      setInterval(()=>{
        if (st.phase !== "question") return;
        if (st.timerPaused) return;
        const hasDueLearning = st.learning.some(x => x.dueTimeMs <= nowMs());
        if (hasDueLearning) refreshUI();
      }, 1000);

      updateTimer();
      refreshUI();
      setTimeout(()=>ansInput.focus(), 0);
    }

    /******************************************************************
     * UTIL
     ******************************************************************/
    function escapeHTML(s){
      return String(s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    /******************************************************************
     * BOOT
     ******************************************************************/
    render();
  </script>
</body>
</html>
